<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bike Fit Comparison & BikeGeoCalc Link Generator</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link rel="icon" type="image/png" href="favicon.png">
  <link rel="shortcut icon" href="favicon.ico">
  
  <!-- Google Fonts: Outfit -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  
  <style>
    :root {
      --bg-gradient: linear-gradient(135deg, #090d16, #111827, #070a10);
      --panel-bg: rgba(17, 24, 39, 0.7);
      --panel-border: rgba(255, 255, 255, 0.08);
      --text-main: #f3f4f6;
      --text-muted: #9ca3af;
      
      --color-bike-a: #06b6d4; /* Neon Cyan */
      --color-bike-a-glow: rgba(6, 182, 212, 0.15);
      --color-bike-b: #ec4899; /* Neon Magenta */
      --color-bike-b-glow: rgba(236, 72, 153, 0.15);
      
      --accent-glowing: linear-gradient(90deg, #06b6d4, #8b5cf6, #ec4899);
      --transition-smooth: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Outfit', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: var(--bg-gradient);
      background-attachment: fixed;
      color: var(--text-main);
      min-height: 100vh;
      line-height: 1.5;
      overflow-x: hidden;
      padding: 2rem 1.5rem;
    }

    /* Grid layout background glow */
    body::before {
      content: '';
      position: fixed;
      top: -10%;
      left: -10%;
      width: 50vw;
      height: 50vh;
      background: radial-gradient(circle, rgba(99, 102, 241, 0.15) 0%, transparent 70%);
      z-index: -1;
      pointer-events: none;
    }
    body::after {
      content: '';
      position: fixed;
      bottom: -10%;
      right: -10%;
      width: 50vw;
      height: 50vh;
      background: radial-gradient(circle, rgba(236, 72, 153, 0.12) 0%, transparent 70%);
      z-index: -1;
      pointer-events: none;
    }

    .container {
      max-width: 1400px;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      gap: 1.5rem;
    }

    header {
      text-align: center;
      margin-bottom: 1rem;
      position: relative;
    }

    h1 {
      font-size: 2.5rem;
      font-weight: 800;
      letter-spacing: -0.05em;
      background: linear-gradient(to right, #ffffff, #9ca3af);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 0.5rem;
    }

    header p {
      color: var(--text-muted);
      font-size: 1.1rem;
      font-weight: 300;
    }

    /* Main layout grid */
    .app-grid {
      display: grid;
      grid-template-columns: 380px 1fr;
      gap: 1.5rem;
      align-items: start;
    }

    @media (max-width: 1024px) {
      .app-grid {
        grid-template-columns: 1fr;
      }
    }

    /* Card Panels */
    .panel {
      background: var(--panel-bg);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid var(--panel-border);
      border-radius: 16px;
      padding: 1.5rem;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
      display: flex;
      flex-direction: column;
      gap: 1.25rem;
    }

    .panel-title {
      font-size: 1.25rem;
      font-weight: 600;
      letter-spacing: -0.02em;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid rgba(255, 255, 255, 0.05);
      padding-bottom: 0.75rem;
    }

    /* Search & Filter Controls */
    .search-wrapper {
      position: relative;
    }

    .search-input {
      width: 100%;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 8px;
      padding: 0.75rem 1rem 0.75rem 2.5rem;
      color: var(--text-main);
      font-family: inherit;
      font-size: 0.95rem;
      transition: var(--transition-smooth);
    }

    .search-input:focus {
      outline: none;
      border-color: #6366f1;
      box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.25);
      background: rgba(255, 255, 255, 0.08);
    }

    .search-icon {
      position: absolute;
      left: 0.85rem;
      top: 50%;
      transform: translateY(-50%);
      width: 1rem;
      height: 1rem;
      fill: var(--text-muted);
      pointer-events: none;
    }

    /* Bike list scroll container */
    .bike-list-container {
      max-height: 70vh;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
      padding-right: 0.25rem;
    }

    /* Custom scrollbar */
    .bike-list-container::-webkit-scrollbar,
    .table-container::-webkit-scrollbar {
      width: 6px;
      height: 6px;
    }
    .bike-list-container::-webkit-scrollbar-track,
    .table-container::-webkit-scrollbar-track {
      background: transparent;
    }
    .bike-list-container::-webkit-scrollbar-thumb,
    .table-container::-webkit-scrollbar-thumb {
      background: rgba(255, 255, 255, 0.1);
      border-radius: 3px;
    }
    .bike-list-container::-webkit-scrollbar-thumb:hover,
    .table-container::-webkit-scrollbar-thumb:hover {
      background: rgba(255, 255, 255, 0.2);
    }

    /* Bike Card Item */
    .bike-item {
      background: rgba(255, 255, 255, 0.02);
      border: 1px solid rgba(255, 255, 255, 0.05);
      border-radius: 10px;
      padding: 0.85rem 1rem;
      cursor: pointer;
      position: relative;
      transition: var(--transition-smooth);
      display: flex;
      flex-direction: column;
      gap: 0.25rem;
      user-select: none;
    }

    .bike-item:hover {
      background: rgba(255, 255, 255, 0.05);
      transform: translateY(-1px);
    }

    .bike-item.selected-a {
      border-color: var(--color-bike-a);
      background: var(--color-bike-a-glow);
      box-shadow: 0 0 12px rgba(6, 182, 212, 0.1);
    }

    .bike-item.selected-b {
      border-color: var(--color-bike-b);
      background: var(--color-bike-b-glow);
      box-shadow: 0 0 12px rgba(236, 72, 153, 0.1);
    }

    .bike-item-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .bike-name {
      font-weight: 600;
      font-size: 1rem;
    }

    .bike-badge {
      font-size: 0.75rem;
      font-weight: 700;
      text-transform: uppercase;
      padding: 0.15rem 0.45rem;
      border-radius: 4px;
      letter-spacing: 0.05em;
    }

    .bike-badge.badge-a {
      background: var(--color-bike-a);
      color: #000;
    }

    .bike-badge.badge-b {
      background: var(--color-bike-b);
      color: #fff;
    }

    .bike-item-details {
      display: flex;
      gap: 1rem;
      font-size: 0.8rem;
      color: var(--text-muted);
    }

    /* Drag and Drop Zone */
    .dropzone {
      border: 2px dashed rgba(255, 255, 255, 0.1);
      border-radius: 10px;
      padding: 1rem;
      text-align: center;
      cursor: pointer;
      transition: var(--transition-smooth);
      background: rgba(255, 255, 255, 0.01);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.5rem;
    }

    .dropzone:hover, .dropzone.dragover {
      border-color: #6366f1;
      background: rgba(99, 102, 241, 0.05);
    }

    .dropzone-icon {
      width: 1.5rem;
      height: 1.5rem;
      fill: var(--text-muted);
    }

    .dropzone p {
      font-size: 0.8rem;
      color: var(--text-muted);
    }

    .dropzone span {
      font-size: 0.75rem;
      text-decoration: underline;
      color: #818cf8;
    }

    /* Right panel: Output & Comparison */
    .comparison-container {
      display: grid;
      grid-template-columns: 1fr;
      gap: 1.5rem;
    }

    @media (min-width: 1200px) {
      .comparison-container {
        grid-template-columns: 1fr 1.1fr;
        align-items: start;
      }
    }

    /* Empty state */
    .empty-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 5rem 2rem;
      text-align: center;
      gap: 1rem;
      color: var(--text-muted);
    }

    .empty-state-icon {
      width: 4rem;
      height: 4rem;
      fill: rgba(255, 255, 255, 0.05);
      margin-bottom: 0.5rem;
    }

    /* Action bar with generated link */
    .action-bar {
      display: flex;
      flex-direction: column;
      gap: 1rem;
      background: rgba(255, 255, 255, 0.02);
      border: 1px solid rgba(255, 255, 255, 0.05);
      border-radius: 12px;
      padding: 1.25rem;
    }

    .link-container {
      display: flex;
      gap: 0.5rem;
      align-items: center;
      background: rgba(0, 0, 0, 0.3);
      padding: 0.75rem 1rem;
      border-radius: 8px;
      border: 1px solid rgba(255, 255, 255, 0.05);
    }

    .link-text {
      flex: 1;
      font-family: monospace;
      font-size: 0.85rem;
      color: #38bdf8;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .btn {
      font-family: inherit;
      font-weight: 600;
      padding: 0.75rem 1.25rem;
      border-radius: 8px;
      border: none;
      cursor: pointer;
      transition: var(--transition-smooth);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      font-size: 0.95rem;
    }

    .btn-primary {
      background: var(--accent-glowing);
      background-size: 200% auto;
      color: white;
      box-shadow: 0 4px 15px rgba(99, 102, 241, 0.3);
    }

    .btn-primary:hover {
      background-position: right center;
      box-shadow: 0 6px 20px rgba(236, 72, 153, 0.4);
      transform: translateY(-1px);
    }

    .btn-secondary {
      background: rgba(255, 255, 255, 0.08);
      border: 1px solid rgba(255, 255, 255, 0.05);
      color: var(--text-main);
    }

    .btn-secondary:hover {
      background: rgba(255, 255, 255, 0.15);
    }

    .btn-icon {
      width: 1.1rem;
      height: 1.1rem;
      fill: currentColor;
    }

    .button-group {
      display: flex;
      gap: 0.75rem;
    }

    .button-group > .btn-primary {
      flex: 1;
    }

    /* Canvas Drawing Area */
    .canvas-panel {
      position: relative;
      background: rgba(0, 0, 0, 0.4);
      border-radius: 12px;
      border: 1px solid rgba(255, 255, 255, 0.03);
      overflow: hidden;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .canvas-legend {
      position: absolute;
      top: 1rem;
      left: 1rem;
      display: flex;
      gap: 1.25rem;
      background: rgba(17, 24, 39, 0.85);
      backdrop-filter: blur(8px);
      border: 1px solid rgba(255, 255, 255, 0.08);
      padding: 0.5rem 0.85rem;
      border-radius: 6px;
      font-size: 0.8rem;
    }

    .legend-item {
      display: flex;
      align-items: center;
      gap: 0.4rem;
    }

    .legend-color {
      width: 10px;
      height: 10px;
      border-radius: 2px;
    }

    .legend-a { background: var(--color-bike-a); }
    .legend-b { background: var(--color-bike-b); }

    canvas {
      width: 100%;
      max-width: 800px;
      height: auto;
      display: block;
      aspect-ratio: 1.6;
    }

    /* Comparison Table */
    .table-container {
      overflow-x: auto;
      border-radius: 12px;
      border: 1px solid rgba(255, 255, 255, 0.05);
    }

    table {
      width: 100%;
      border-collapse: collapse;
      text-align: left;
      font-size: 0.9rem;
    }

    th, td {
      padding: 0.85rem 1.25rem;
      border-bottom: 1px solid rgba(255, 255, 255, 0.03);
    }

    th {
      background: rgba(255, 255, 255, 0.02);
      font-weight: 600;
      color: var(--text-muted);
    }

    tr:hover td {
      background: rgba(255, 255, 255, 0.01);
    }

    .row-category {
      font-size: 0.75rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: #818cf8;
      background: rgba(99, 102, 241, 0.03) !important;
      border-bottom: 1px solid rgba(99, 102, 241, 0.1);
    }

    .val-a {
      color: var(--color-bike-a);
      font-weight: 500;
    }

    .val-b {
      color: var(--color-bike-b);
      font-weight: 500;
    }

    .diff-badge {
      display: inline-block;
      font-size: 0.75rem;
      font-weight: 600;
      padding: 0.1rem 0.35rem;
      border-radius: 4px;
      margin-left: 0.5rem;
    }

    .diff-neutral {
      background: rgba(255, 255, 255, 0.05);
      color: var(--text-muted);
    }

    .diff-positive {
      background: rgba(16, 185, 129, 0.1);
      color: #34d399;
    }

    .diff-negative {
      background: rgba(239, 68, 68, 0.1);
      color: #f87171;
    }

    /* Toast Notification */
    .toast {
      position: fixed;
      bottom: 2rem;
      right: 2rem;
      background: rgba(17, 24, 39, 0.95);
      border: 1px solid rgba(255, 255, 255, 0.1);
      color: var(--text-main);
      padding: 0.85rem 1.5rem;
      border-radius: 8px;
      box-shadow: 0 10px 25px rgba(0, 0, 0, 0.4);
      display: flex;
      align-items: center;
      gap: 0.5rem;
      transform: translateY(150%);
      transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      z-index: 1000;
    }

    .toast.show {
      transform: translateY(0);
    }

    .toast-icon {
      fill: #34d399;
      width: 1.25rem;
      height: 1.25rem;
    }

    /* Clear/Reset selection button */
    .clear-btn {
      font-size: 0.75rem;
      color: var(--text-muted);
      cursor: pointer;
      text-decoration: underline;
      transition: var(--transition-smooth);
      background: none;
      border: none;
      font-family: inherit;
    }

    .clear-btn:hover {
      color: #f87171;
    }
  </style>
</head>
<body>

  <div class="container">
    <header>
      <h1>Bike Fit Explorer</h1>
      <p>Select two configurations to overlay geometry and generate a BikeGeoCalc link</p>
    </header>

    <div class="app-grid">
      <!-- Left Column: Config List -->
      <div class="panel">
        <div class="panel-title">
          <span>Fit Files</span>
          <button id="clear-selection" class="clear-btn" style="display: none;">Deselect All</button>
        </div>

        <div class="search-wrapper">
          <svg class="search-icon" viewBox="0 0 24 24"><path d="M15.5 14h-.79l-.28-.27C15.41 12.59 16 11.11 16 9.5 16 5.91 13.09 3 9.5 3S3 5.91 3 9.5 5.91 16 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg>
          <input type="text" id="search-input" class="search-input" placeholder="Search fit configurations...">
        </div>

        <div id="bike-list" class="bike-list-container">
          <!-- Dynamically populated -->
        </div>

        <!-- Drag & Drop Zone -->
        <div id="drop-zone" class="dropzone">
          <svg class="dropzone-icon" viewBox="0 0 24 24"><path d="M19.35 10.04C18.67 6.59 15.64 4 12 4 9.11 4 6.6 5.64 5.35 8.04 2.34 8.36 0 10.91 0 14c0 3.31 2.69 6 6 6h13c2.76 0 5-2.24 5-5 0-2.64-2.05-4.78-4.65-4.96zM14 13v4h-4v-4H7l5-5 5 5h-3z"/></svg>
          <p>Have another fit? Drag & drop JSON here or <span>browse files</span></p>
          <input type="file" id="file-input" style="display: none;" multiple accept=".json">
        </div>
      </div>

      <!-- Right Column: Comparison & Details -->
      <div id="details-panel" class="panel" style="min-height: 500px;">
        <!-- Filled dynamically: empty state or comparison dashboard -->
      </div>
    </div>
  </div>

  <!-- Toast Notification -->
  <div id="toast" class="toast">
    <svg class="toast-icon" viewBox="0 0 24 24"><path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z"/></svg>
    <span id="toast-message">Link copied to clipboard!</span>
  </div>

  <script>
    // Config files list fallback if fetching files.json fails
    const FALLBACK_FILES = [
      "Aethos-54.json",
      "BreakAway-small.json",
      "Crux4-52.json",
      "Montebello-small.json",
      "RoadlogicDisc-55.json",
      "RodeoLabsFlaanimal5.0-54.json",
      "Strael-51t.json",
      "unowned/Strael54R.json",
      "unowned/honey-allroads.json",
      "unowned/rodeo52.json",
      "unowned/strael54T.json"
    ];

    // BikeGeoCalc key mapping
    const KEY_MAPPING = {
      offsetX: 'a',
      offsetY: 'b',
      bottomBracketX: 'c',
      bottomBracketY: 'd',
      seatTubeTopCenterX: 'e',
      seatTubeTopCenterY: 'f',
      saddleTopY: 'g',
      saddleBackX: 'h',
      backHubX: 'i',
      hubY: 'j',
      frontHubX: 'k',
      headTubeTopCenterY: 'l',
      headTubeTopCenterX: 'm',
      headTubeBottomCenterY: 'n',
      headTubeBottomCenterX: 'o',
      handlebarTopY: 'p',
      handlebarBackX: 'q',
      hoodsRestTopX: 'r',
      hoodsRestTopY: 's',
      handlebarDiameter: 't',
      stemStack: 'u',
      stemAngle: 'v',
      headsetBottomStack: 'w',
      headsetTopStack: 'x',
      saddleLength: 'y',
      saddleStack: 'z',
      saddleAngle: 'A',
      saddleFrontToCenter: 'B',
      seatpostSetback: 'C',
      forkLength: 'D',
      forkRake: 'E',
      crankLength: 'F',
      headTubeTopToTopTubeCenter: 'G',
      seatTubeTopToTopTubeCenter: 'H'
    };

    // Standard fallback bike geometries if some keys are missing
    const DEFAULT_GEOMETRY = {
      offsetX: 0,
      offsetY: 0,
      bottomBracketX: 750,
      bottomBracketY: 270,
      seatTubeTopCenterX: 618,
      seatTubeTopCenterY: 737,
      saddleTopY: 926,
      saddleBackX: 433,
      backHubX: 340,
      hubY: 340,
      frontHubX: 1324,
      headTubeTopCenterY: 819,
      headTubeTopCenterX: 1134,
      headTubeBottomCenterY: 687,
      headTubeBottomCenterX: 1174,
      handlebarTopY: 893,
      handlebarBackX: 1203,
      hoodsRestTopX: 1328,
      hoodsRestTopY: 902,
      handlebarDiameter: 31.8,
      stemStack: 40,
      stemAngle: 6,
      headsetBottomStack: 0,
      headsetTopStack: 8,
      saddleLength: 240,
      saddleStack: 40,
      saddleAngle: 0,
      saddleFrontToCenter: 150,
      seatpostSetback: 20,
      forkLength: 370,
      forkRake: 44,
      crankLength: 170,
      headTubeTopToTopTubeCenter: 30,
      seatTubeTopToTopTubeCenter: 30
    };

    // State
    let bikeConfigs = [];
    let selectedBikes = [null, null]; // [Bike A, Bike B]
    let filesLoaded = false;

    // Elements
    const bikeListEl = document.getElementById('bike-list');
    const searchInput = document.getElementById('search-input');
    const clearSelectionBtn = document.getElementById('clear-selection');
    const detailsPanel = document.getElementById('details-panel');
    const dropZone = document.getElementById('drop-zone');
    const fileInput = document.getElementById('file-input');

    // Init App
    window.addEventListener('DOMContentLoaded', async () => {
      await loadFileList();
      renderBikeList();
      renderDetailsPanel();

      // Search Filter
      searchInput.addEventListener('input', (e) => {
        renderBikeList(e.target.value.trim());
      });

      // Clear Selection
      clearSelectionBtn.addEventListener('click', () => {
        selectedBikes = [null, null];
        updateSelectionUI();
        renderDetailsPanel();
      });

      // Dropzone interaction
      dropZone.addEventListener('click', () => fileInput.click());
      fileInput.addEventListener('change', handleFileSelect);

      dropZone.addEventListener('dragover', (e) => {
        e.preventDefault();
        dropZone.classList.add('dragover');
      });

      dropZone.addEventListener('dragleave', () => {
        dropZone.classList.remove('dragover');
      });

      dropZone.addEventListener('drop', (e) => {
        e.preventDefault();
        dropZone.classList.remove('dragover');
        if (e.dataTransfer.files.length > 0) {
          handleFiles(e.dataTransfer.files);
        }
      });
    });

    // Load File list
    async function loadFileList() {
      let files = [];
      try {
        const response = await fetch('files.json');
        if (response.ok) {
          try {
            files = await response.json();
          } catch (jsonErr) {
            console.error('Error parsing files.json:', jsonErr);
            showToast('Error parsing "files.json": invalid JSON', true);
            files = FALLBACK_FILES;
          }
        } else {
          files = FALLBACK_FILES;
        }
      } catch (err) {
        console.warn('Could not fetch files.json, falling back to static list.', err);
        files = FALLBACK_FILES;
      }

      // Load each configuration contents
      const loadPromises = files.map(async (fileName) => {
        try {
          const res = await fetch(fileName);
          if (res.ok) {
            try {
              const data = await res.json();
              return {
                fileName: fileName,
                name: data.name || fileName.split('/').pop().replace('.json', ''),
                data: data
              };
            } catch (jsonErr) {
              console.error(`Error parsing ${fileName}:`, jsonErr);
              showToast(`Error parsing "${fileName}": invalid JSON`, true);
            }
          } else {
            console.error(`Error loading ${fileName}: status ${res.status}`);
          }
        } catch (e) {
          console.error(`Error loading ${fileName}:`, e);
        }
        return null;
      });

      const results = await Promise.all(loadPromises);
      bikeConfigs = results.filter(b => b !== null);
      filesLoaded = true;
    }

    // Drag-drop files parsing
    function handleFileSelect(e) {
      if (e.target.files.length > 0) {
        handleFiles(e.target.files);
      }
    }

    function handleFiles(files) {
      Array.from(files).forEach(file => {
        if (!file.name.endsWith('.json')) {
          showToast(`File "${file.name}" must be a JSON file`, true);
          return;
        }
        const reader = new FileReader();
        reader.onload = function(e) {
          try {
            const data = JSON.parse(e.target.result);
            const name = data.name || file.name.replace('.json', '');
            
            // Avoid duplicates
            const existingIdx = bikeConfigs.findIndex(b => b.name.toLowerCase() === name.toLowerCase());
            const newConfig = {
              fileName: `uploaded_${file.name}`,
              name: name,
              data: data,
              isUploaded: true
            };
            
            if (existingIdx !== -1) {
              bikeConfigs[existingIdx] = newConfig;
            } else {
              bikeConfigs.push(newConfig);
            }
            
            showToast(`Loaded "${name}"`);
            renderBikeList();
            
            // Automatically select the newly loaded bike
            selectBike(newConfig);
          } catch (err) {
            showToast(`Error parsing "${file.name}": invalid JSON`, true);
          }
        };
        reader.readAsText(file);
      });
    }

    // Render configuration list
    function renderBikeList(query = '') {
      bikeListEl.innerHTML = '';
      const filtered = bikeConfigs.filter(b => 
        b.name.toLowerCase().includes(query.toLowerCase()) ||
        b.fileName.toLowerCase().includes(query.toLowerCase())
      );

      if (filtered.length === 0) {
        bikeListEl.innerHTML = `<div style="text-align: center; color: var(--text-muted); font-size: 0.9rem; padding: 2rem 0;">No matching configurations found.</div>`;
        return;
      }

      filtered.forEach(bike => {
        const item = document.createElement('div');
        item.className = 'bike-item';
        item.dataset.filename = bike.fileName;
        
        const isSelectedA = selectedBikes[0] && selectedBikes[0].fileName === bike.fileName;
        const isSelectedB = selectedBikes[1] && selectedBikes[1].fileName === bike.fileName;

        if (isSelectedA) item.classList.add('selected-a');
        if (isSelectedB) item.classList.add('selected-b');

        let badgeHtml = '';
        if (isSelectedA) badgeHtml = `<span class="bike-badge badge-a">Bike A</span>`;
        if (isSelectedB) badgeHtml = `<span class="bike-badge badge-b">Bike B</span>`;

        // Retrieve Stack and Reach for small card details
        const stack = bike.data.stack ? `${Math.round(bike.data.stack)}mm` : 'N/A';
        const reach = bike.data.reach ? `${Math.round(bike.data.reach)}mm` : 'N/A';
        const isCustom = bike.isUploaded ? ' (uploaded)' : '';

        item.innerHTML = `
          <div class="bike-item-header">
            <span class="bike-name">${escapeHtml(bike.name)}</span>
            ${badgeHtml}
          </div>
          <div class="bike-item-details">
            <span>Stack: ${stack}</span>
            <span>Reach: ${reach}</span>
            ${bike.isUploaded ? `<span style="color: #818cf8;">Local File</span>` : ''}
          </div>
        `;

        item.addEventListener('click', () => selectBike(bike));
        bikeListEl.appendChild(item);
      });
    }

    // Select Bike
    function selectBike(bike) {
      const isA = selectedBikes[0] && selectedBikes[0].fileName === bike.fileName;
      const isB = selectedBikes[1] && selectedBikes[1].fileName === bike.fileName;

      if (isA) {
        // Deselect Bike A, promote Bike B to Bike A
        selectedBikes[0] = selectedBikes[1];
        selectedBikes[1] = null;
      } else if (isB) {
        // Deselect Bike B
        selectedBikes[1] = null;
      } else {
        // Select new bike
        if (selectedBikes[0] === null) {
          selectedBikes[0] = bike;
        } else if (selectedBikes[1] === null) {
          selectedBikes[1] = bike;
        } else {
          // Both slots filled. Deselect A, push B to A, place new at B
          selectedBikes[0] = selectedBikes[1];
          selectedBikes[1] = bike;
        }
      }

      updateSelectionUI();
      renderDetailsPanel();
    }

    // Update highlights in list
    function updateSelectionUI() {
      const items = bikeListEl.querySelectorAll('.bike-item');
      items.forEach(item => {
        const fn = item.dataset.filename;
        item.className = 'bike-item';
        
        const isSelectedA = selectedBikes[0] && selectedBikes[0].fileName === fn;
        const isSelectedB = selectedBikes[1] && selectedBikes[1].fileName === fn;

        if (isSelectedA) item.classList.add('selected-a');
        if (isSelectedB) item.classList.add('selected-b');

        const header = item.querySelector('.bike-item-header');
        let badge = header.querySelector('.bike-badge');
        if (badge) badge.remove();

        if (isSelectedA) {
          header.insertAdjacentHTML('beforeend', `<span class="bike-badge badge-a">Bike A</span>`);
        } else if (isSelectedB) {
          header.insertAdjacentHTML('beforeend', `<span class="bike-badge badge-b">Bike B</span>`);
        }
      });

      // Clear button visibility
      const hasSelection = selectedBikes[0] !== null || selectedBikes[1] !== null;
      clearSelectionBtn.style.display = hasSelection ? 'block' : 'none';
    }

    // Generate BikeGeoCalc URL
    function generateBikeGeoCalcUrl() {
      let url = 'https://www.bikegeocalc.com/#';
      
      selectedBikes.forEach(bike => {
        if (!bike) return;
        const data = bike.data;
        const nameStr = (data.name || bike.name).replace(/\s+/g, '+');
        let part = `${nameStr.length}${nameStr}`;

        for (const [key, letter] of Object.entries(KEY_MAPPING)) {
          const rawVal = data[key] !== undefined ? data[key] : DEFAULT_GEOMETRY[key];
          const val = Math.round(rawVal * 100000) / 100000;
          part += `${letter}${val}`;
        }
        part += 'Z';
        url += part;
      });

      return url;
    }

    // Render Table Row
    function renderTableRow(displayName, key, unit, highlight = false) {

      const valB = bikeB ? bikeB.data[key] : undefined;

      }

      const displayA = valA !== undefined ? Math.round(valA * 10) / 10 : '-';
      const displayB = valB !== undefined ? Math.round(valB * 10) / 10 : '-';
      const tdStyle = highlight ? 'font-weight: 500; color: var(--text-main);' : '';

          </tr>

      }

      // Two bikes mode
      let diffHtml = '';
      if (valA !== undefined && valB !== undefined) {
        const diff = valB - valA;
        const absDiff = Math.abs(Math.round(diff * 10) / 10);
        if (absDiff === 0) {
          diffHtml = `<span class="diff-badge diff-neutral">Equal</span>`;
        } else {
          // Check if difference represents taller or longer for key elements
          let relText = '';
          if (key === 'stack' || key === 'saddleTopY' || key === 'handlebarTopY') {
            relText = diff > 0 ? 'taller' : 'shorter';
          } else if (key === 'reach' || key === 'wheelBase' || key === 'chainStayLength') {
            relText = diff > 0 ? 'longer' : 'shorter';
          }
          
          const suffix = relText ? ` (${relText})` : '';
          const diffSign = diff > 0 ? `+${absDiff}` : `-${absDiff}`;
          const badgeClass = diff > 0 ? 'diff-positive' : 'diff-negative';
          
          diffHtml = `<span class="diff-badge ${badgeClass}">${diffSign}${unit}${suffix}</span>`;
        }
      } else {
        diffHtml = '<span class="diff-badge diff-neutral">N/A</span>';
      }

      return `
        <tr>
          <td style="${tdStyle}">${displayName}</td>
          <td class="val-a">${displayA}${valA !== undefined ? unit : ''}</td>
          <td class="val-b">${displayB}${valB !== undefined ? unit : ''}</td>
          <td>${diffHtml}</td>

    // Canvas Draw Routine
    function drawBike(ctx, bike, color, canvasWidth, canvasHeight, bounds) {
      const { minX, maxX, minY, maxY } = bounds;

      const bikeWidth = maxX - minX;
      const bikeHeight = maxY - minY;

      const padding = 25; // Canvas inner padding
      const scaleX = (canvasWidth - 2 * padding) / bikeWidth;
      const scaleY = (canvasHeight - 2 * padding) / bikeHeight;
      const scale = Math.min(scaleX, scaleY);

      // Center the bike horizontally and bottom-align it on the canvas
      const offsetX = padding + (canvasWidth - 2 * padding - bikeWidth * scale) / 2 - minX * scale;
      const offsetY = canvasHeight - padding;

      // Helper to convert bike coords to canvas coords
      const toCanvasX = (x) => offsetX + x * scale;
      const toCanvasY = (y) => offsetY - y * scale; // Invert Y

      // 1. Draw Grid lines (only draw once, if color is the first bike's color to prevent duplicates)
      if (color === '#06b6d4') {
        ctx.strokeStyle = 'rgba(255, 255, 255, 0.03)';
        ctx.lineWidth = 1;
        
        // Draw vertical grid lines at 100mm increments
        const startGridX = Math.floor(minX / 100) * 100;
        for (let x = startGridX; x < maxX; x += 100) {
          ctx.beginPath();
          ctx.moveTo(toCanvasX(x), toCanvasY(0));
          ctx.lineTo(toCanvasX(x), toCanvasY(maxY));
          ctx.stroke();
        }
        
        // Draw horizontal grid lines at 100mm increments
        for (let y = 100; y < maxY; y += 100) {
          ctx.beginPath();
          ctx.moveTo(toCanvasX(minX), toCanvasY(y));
          ctx.lineTo(toCanvasX(maxX), toCanvasY(y));
          ctx.stroke();
        }

        // Draw Ground line
        ctx.beginPath();
        ctx.strokeStyle = 'rgba(255, 255, 255, 0.15)';
        ctx.lineWidth = 1.5;
        ctx.moveTo(toCanvasX(minX), toCanvasY(0));
        ctx.lineTo(toCanvasX(maxX), toCanvasY(0));
        ctx.stroke();
      }

      ctx.strokeStyle = color;
      ctx.lineWidth = 2;
      ctx.lineCap = 'round';
      ctx.lineJoin = 'round';

      // Extract points or default values
      const getVal = (k) => bike[k] !== undefined ? bike[k] : DEFAULT_GEOMETRY[k];

      const bb = { x: getVal('bottomBracketX'), y: getVal('bottomBracketY') };
      const rHub = { x: getVal('backHubX'), y: getVal('hubY') };
      const fHub = { x: getVal('frontHubX'), y: getVal('hubY') };
      const stTop = { x: getVal('seatTubeTopCenterX'), y: getVal('seatTubeTopCenterY') };
      const htTop = { x: getVal('headTubeTopCenterX'), y: getVal('headTubeTopCenterY') };
      const htBot = { x: getVal('headTubeBottomCenterX'), y: getVal('headTubeBottomCenterY') };
      const hb = { x: getVal('handlebarBackX'), y: getVal('handlebarTopY') };
      const hoods = { x: getVal('hoodsRestTopX'), y: getVal('hoodsRestTopY') };
      const saddleBack = { x: getVal('saddleBackX'), y: getVal('saddleTopY') };

      // Wheels
      const r = getVal('wheelRadius');
      ctx.beginPath();
      ctx.arc(toCanvasX(rHub.x), toCanvasY(rHub.y), r * scale, 0, 2 * Math.PI);
      ctx.stroke();

      ctx.beginPath();
      ctx.arc(toCanvasX(fHub.x), toCanvasY(fHub.y), r * scale, 0, 2 * Math.PI);
      ctx.stroke();

      // Rear Triangle (rHub -> bb -> stTop -> rHub)
      ctx.beginPath();
      ctx.moveTo(toCanvasX(rHub.x), toCanvasY(rHub.y));
      ctx.lineTo(toCanvasX(bb.x), toCanvasY(bb.y));
      ctx.lineTo(toCanvasX(stTop.x), toCanvasY(stTop.y));
      ctx.closePath();
      ctx.stroke();

      // Front Triangle (bb -> stTop -> htTop -> htBot -> bb)
      ctx.beginPath();
      ctx.moveTo(toCanvasX(bb.x), toCanvasY(bb.y));
      ctx.lineTo(toCanvasX(stTop.x), toCanvasY(stTop.y));
      ctx.lineTo(toCanvasX(htTop.x), toCanvasY(htTop.y));
      ctx.lineTo(toCanvasX(htBot.x), toCanvasY(htBot.y));
      ctx.closePath();
      ctx.stroke();

      // Fork (htBot -> fHub)
      ctx.beginPath();
      ctx.moveTo(toCanvasX(htBot.x), toCanvasY(htBot.y));
      ctx.lineTo(toCanvasX(fHub.x), toCanvasY(fHub.y));
      ctx.stroke();

      // Seatpost & Saddle
      ctx.beginPath();
      ctx.moveTo(toCanvasX(stTop.x), toCanvasY(stTop.y));
      ctx.lineTo(toCanvasX(saddleBack.x), toCanvasY(saddleBack.y));
      ctx.stroke();

      // Saddle shape
      const saddleLen = getVal('saddleLength');
      const saddleAngleRad = (getVal('saddleAngle') * Math.PI) / 180;
      const saddleFrontX = saddleBack.x + saddleLen * Math.cos(saddleAngleRad);
      const saddleFrontY = saddleBack.y - saddleLen * Math.sin(saddleAngleRad);
      ctx.beginPath();
      ctx.moveTo(toCanvasX(saddleBack.x), toCanvasY(saddleBack.y));
      ctx.lineTo(toCanvasX(saddleFrontX), toCanvasY(saddleFrontY));
      ctx.lineWidth = 4;
      ctx.stroke();

      // Cockpit
      ctx.strokeStyle = color;
      ctx.lineWidth = 3;
      // Stem: htTop to hb
      ctx.beginPath();
      ctx.moveTo(toCanvasX(htTop.x), toCanvasY(htTop.y));
      ctx.lineTo(toCanvasX(hb.x), toCanvasY(hb.y));
      ctx.stroke();

      // Handlebar/Hoods: hb to hoods
      ctx.beginPath();
      ctx.lineWidth = 2;
      ctx.moveTo(toCanvasX(hb.x), toCanvasY(hb.y));
      ctx.lineTo(toCanvasX(hoods.x), toCanvasY(hoods.y));
      ctx.stroke();

      // Draw Joint Dots
      ctx.fillStyle = color;
      [bb, rHub, fHub, hb, hoods, saddleBack].forEach(pt => {
        ctx.beginPath();
        ctx.arc(toCanvasX(pt.x), toCanvasY(pt.y), 3.5, 0, 2 * Math.PI);
        ctx.fill();
      });
    }

    // Copy to clipboard
    function copyUrlToClipboard() {
      const urlText = document.getElementById('generated-url').innerText;
      navigator.clipboard.writeText(urlText).then(() => {
        showToast('Link copied to clipboard!');
      }).catch(err => {
        console.error('Could not copy text: ', err);
        showToast('Failed to copy. Please copy it manually.', true);
      });
    }

    let toastTimeout;
    // Toast show helper
    function showToast(message, isError = false) {
      const toast = document.getElementById('toast');
      const toastMsg = document.getElementById('toast-message');
      const toastIcon = toast.querySelector('.toast-icon');

      toastMsg.innerText = message;
      if (isError) {
        toastIcon.style.fill = '#f87171';
        toastIcon.innerHTML = '<path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-2h2v2zm0-4h-2V7h2v6z"/>';
      } else {
        toastIcon.style.fill = '#34d399';
        toastIcon.innerHTML = '<path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z"/>';
      }

      toast.classList.add('show');
      if (toastTimeout) {
        clearTimeout(toastTimeout);
      }
      toastTimeout = setTimeout(() => {
        toast.classList.remove('show');
      }, isError ? 5000 : 3000);
    }

    // Utility escape html
    function escapeHtml(str) {
      return str
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#039;");
    }
  </script>
</body>
